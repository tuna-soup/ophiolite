name: Benchmark

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Benchmark evidence level
        required: true
        type: choice
        default: development
        options:
          - smoke
          - development
          - authoritative
      benchmark_command_line:
        description: Command line to run under the benchmark launcher
        required: true
        type: string
      workers:
        description: Optional explicit worker cap
        required: false
        type: string
        default: ""
      max_wait_minutes:
        description: Maximum time to wait for the heavy lane or quiet host
        required: true
        type: string
        default: "180"
      run_compile_gate:
        description: Run the MSVC bench/test compile gate before benchmarking
        required: true
        type: boolean
        default: true
      artifact_name:
        description: Artifact name prefix for uploaded benchmark results
        required: true
        type: string
        default: benchmark-results

permissions:
  contents: read

jobs:
  benchmark:
    name: Windows Benchmark Runner
    runs-on:
      - self-hosted
      - windows
      - benchmark
    env:
      OPHIOLITE_SQLITE_INCLUDE: ${{ vars.OPHIOLITE_SQLITE_INCLUDE }}
      OPHIOLITE_SQLITE_LIB_DIR: ${{ vars.OPHIOLITE_SQLITE_LIB_DIR }}
      OPHIOLITE_SQLITE_BIN_DIR: ${{ vars.OPHIOLITE_SQLITE_BIN_DIR }}
      OPHIOLITE_VSDEVCMD: ${{ vars.OPHIOLITE_VSDEVCMD }}
      BENCHMARK_COMMAND_LINE: ${{ inputs.benchmark_command_line }}
      BENCHMARK_MODE: ${{ inputs.mode }}
      BENCHMARK_WORKERS: ${{ inputs.workers }}
      BENCHMARK_MAX_WAIT_MINUTES: ${{ inputs.max_wait_minutes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Validate benchmark runner environment
        shell: powershell
        run: |
          $missing = @()
          foreach ($name in @('OPHIOLITE_SQLITE_INCLUDE', 'OPHIOLITE_SQLITE_LIB_DIR')) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$name").Value)) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            throw "Missing required benchmark runner env vars: $($missing -join ', ')"
          }

      - name: Snapshot benchmark runner
        shell: powershell
        run: |
          $cpu = Get-CimInstance Win32_Processor | Measure-Object -Property NumberOfCores, NumberOfLogicalProcessors -Sum
          $os = Get-CimInstance Win32_OperatingSystem
          $cpuLoad = (Get-Counter '\Processor(_Total)\% Processor Time' -SampleInterval 1 -MaxSamples 1).CounterSamples[0].CookedValue
          Write-Host "physical_cores=$($cpu.Sum[0])"
          Write-Host "logical_processors=$($cpu.Sum[1])"
          Write-Host "cpu_load_percent=$([math]::Round($cpuLoad, 1))"
          Write-Host "free_ram_gib=$([math]::Round(($os.FreePhysicalMemory * 1KB) / 1GB, 2))"
          Write-Host "total_ram_gib=$([math]::Round(($os.TotalVisibleMemorySize * 1KB) / 1GB, 2))"

      - name: Verify Windows benchmark environment
        shell: powershell
        run: .\scripts\verify-windows-benchmark-env.ps1

      - name: Compile gate for bench/test surfaces
        if: ${{ inputs.run_compile_gate }}
        shell: powershell
        run: .\scripts\windows-msvc-cargo.cmd check -p ophiolite-seismic-runtime --benches --tests

      - name: Run benchmark
        shell: powershell
        run: |
          $args = @(
            '-Mode', $env:BENCHMARK_MODE,
            '-MaxWaitMinutes', $env:BENCHMARK_MAX_WAIT_MINUTES,
            '-BenchmarkCommandLine', $env:BENCHMARK_COMMAND_LINE
          )
          if (-not [string]::IsNullOrWhiteSpace($env:BENCHMARK_WORKERS)) {
            $args += @('-Workers', $env:BENCHMARK_WORKERS)
          }
          & .\scripts\run-benchmark-gated.ps1 @args 2>&1 | Tee-Object -FilePath benchmark-launch.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            benchmark-launch.log
            articles/benchmarking/results/**/*.json
            target/criterion/**
