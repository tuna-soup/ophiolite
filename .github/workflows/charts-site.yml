name: Charts Site

# Requires repository secret OPHIOLITECHARTS_DEPLOY_TOKEN with push access to
# tuna-soup/ophiolitecharts-com.

on:
  push:
    branches:
      - master
    paths:
      - "apps/ophiolitecharts-docs/**"
      - ".github/workflows/charts-site.yml"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: charts-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install root workspace dependencies
        run: bun install
      - name: Build charts site
        run: bun --filter ophiolitecharts-docs build:site
      - name: Preserve GitHub Pages static asset handling
        run: printf '\n' > apps/ophiolitecharts-docs/dist/.nojekyll
      - name: Check out Pages repository
        uses: actions/checkout@v4
        with:
          repository: tuna-soup/ophiolitecharts-com
          token: ${{ secrets.OPHIOLITECHARTS_DEPLOY_TOKEN }}
          path: deploy-repo
      - name: Sync site into Pages repository
        run: rsync -a --delete --exclude .git apps/ophiolitecharts-docs/dist/ deploy-repo/
      - name: Commit and push site update
        working-directory: deploy-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet --ignore-submodules --exit-code; then
            echo "No site changes to publish."
            exit 0
          fi
          git commit -m "Deploy Ophiolite Charts site"
          git push origin main
