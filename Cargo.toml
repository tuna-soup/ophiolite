[workspace]
members = [
    ".",
    "crates/lithos-core",
    "crates/lithos-parser",
    "crates/lithos-table",
    "crates/lithos-package",
    "crates/lithos-project",
    "crates/lithos-ingest",
    "crates/lithos-compute",
    "crates/lithos-cli",
]
exclude = ["apps/lithos-harness/src-tauri"]
resolver = "2"

[workspace.dependencies]
arrow-array = "58.0.0"
arrow-schema = "58.0.0"
csv = "1.4"
encoding_rs = "0.8"
parquet = "58.0.0"
regex = "1.11"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0.18"
tracing = "0.1.44"

[package]
name = "lithos_las"
version = "0.1.0"
edition = "2024"

[dependencies]
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
csv = { workspace = true }
lithos-core = { path = "crates/lithos-core" }
lithos-parser = { path = "crates/lithos-parser" }
lithos-table = { path = "crates/lithos-table" }
lithos-package = { path = "crates/lithos-package" }
lithos-project = { path = "crates/lithos-project" }
lithos-ingest = { path = "crates/lithos-ingest" }
lithos-compute = { path = "crates/lithos-compute" }
lithos-cli = { path = "crates/lithos-cli" }
parquet = { workspace = true }
rusqlite = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
parquet = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
